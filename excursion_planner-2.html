    // Helper functions
    function parseDuration(dur) {
      const match = dur.match(/(\d+)h(\d+)?/);
      if (match) {
        return parseInt(match[1]) + (match[2] ? parseInt(match[2]) / 60 : 0);
      }
      return 0;
    }

    function calculateValueScore(excursion) {
      const duration = parseDuration(excursion.duration);
      return duration > 0 ? excursion.price / duration : excursion.price;
    }

      if (items[0].port === "Bora Bora") {
        return "Bora Bora is often considered the most iconic location for lagoon activities. Consider booking here for the most memorable backdrop.";

      if (items.some(i => i.port === "Moorea")) {
        return "Moorea offers excellent visibility and is known for its stunning bays. Great choice for photography.";
      }
      return "All locations offer similar experiences. Choose based on your schedule.";
    }

    function getDuplicateExcursions() {
      const codeGroups = {};
      excursionsData.forEach(exc => {
        if (!codeGroups[exc.code]) {
          codeGroups[exc.code] = [];
        }
        codeGroups[exc.code].push(exc);
      });
      return Object.entries(codeGroups)
        .filter(([code, items]) => items.length > 1)
        .map(([code, items]) => ({
          code,
          name: items[0].name,
          price: items[0].price,
          duration: items[0].duration,
          dates: items.map(i => ({ date: i.date, port: i.port, id: i.id })),
          categories: items[0].categories,
          recommendation: items.length > 1 ? getRecommendation(items) : null
        }));
    }

    function getFilteredExcursions() {
      return excursionsData.filter(exc => {
        if (!state.showHidden && state.hiddenIds.has(exc.id)) return false;
        if (state.showOnlyFavorites && !state.favorites.has(exc.id)) return false;
        if (state.showOnlyBooked && !state.booked.has(exc.id)) return false;
        if (!state.selectedDates.has(exc.date)) return false;
        if (!state.selectedPorts.has(exc.port)) return false;
        if (exc.price < state.priceRange[0] || exc.price > state.priceRange[1]) return false;
        
        const duration = parseDuration(exc.duration);
        if (duration < state.durationRange[0] || duration > state.durationRange[1]) return false;
        
        if (state.selectedCategories.size > 0) {
          const hasCategory = exc.categories.some(cat => state.selectedCategories.has(cat));
          if (!hasCategory) return false;
        }
        
        if (state.searchTerm) {
          const search = state.searchTerm.toLowerCase();
          const matchesSearch = 
            exc.name.toLowerCase().includes(search) ||
            exc.description.toLowerCase().includes(search) ||
            exc.code.toLowerCase().includes(search) ||
            exc.categories.some(cat => cat.toLowerCase().includes(search));
          if (!matchesSearch) return false;
        }
        
        return true;

        let comparison = 0;
        switch (state.sortBy) {
          case "date":
            comparison = dates.indexOf(a.date) - dates.indexOf(b.date);
            break;
          case "price":
            comparison = a.price - b.price;
            break;
          case "duration":
            comparison = parseDuration(a.duration) - parseDuration(b.duration);
            break;
          case "value":
            comparison = calculateValueScore(a) - calculateValueScore(b);
            break;
          case "name":
            comparison = a.name.localeCompare(b.name);
            break;
        }
        return state.sortOrder === "asc" ? comparison : -comparison;
      });
    }

      check: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`,
      checkCircle: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
      checkCircleFilled: `<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path></svg>`
    };

    // Render function
    function render() {
      const filteredExcursions = getFilteredExcursions();
      const topValuePicks = getTopValuePicks();
      const duplicateExcursions = getDuplicateExcursions();
      const allCategories = getAllCategories();

      const app = document.getElementById('app');
      app.innerHTML = `
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white p-6 shadow-lg">
          <h1 class="text-3xl font-bold mb-2">🏝️ Tahiti Cruise Excursion Planner</h1>
          <p class="text-blue-100">Le Paul Gauguin · April 25 - May 2, 2026 · French Polynesia</p>
          <div class="flex gap-4 mt-4 text-sm flex-wrap">
            <span class="bg-white/20 px-3 py-1 rounded-full">${filteredExcursions.length} excursions shown</span>
            <span class="bg-white/20 px-3 py-1 rounded-full">${state.hiddenIds.size} hidden</span>
            <span class="bg-white/20 px-3 py-1 rounded-full">${state.favorites.size} favorites</span>
            <span class="bg-green-500/30 px-3 py-1 rounded-full">${state.booked.size} booked</span>
          </div>
        </div>

        <div class="p-4 max-w-7xl mx-auto">
          <!-- Quick Actions -->
          <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="toggleFilters()" class="flex items-center gap-2 px-4 py-2 bg-white rounded-lg shadow hover:shadow-md transition">
              ${icons.filter}
              ${state.showFilters ? "Hide Filters" : "Show Filters"}
            </button>
            <button onclick="toggleValueAnalysis()" class="flex items-center gap-2 px-4 py-2 rounded-lg shadow hover:shadow-md transition ${state.showValueAnalysis ? 'bg-yellow-100' : 'bg-white'}">
              ${icons.star}
              Best Value
            </button>
            <button onclick="toggleDuplicateAnalysis()" class="flex items-center gap-2 px-4 py-2 rounded-lg shadow hover:shadow-md transition ${state.showDuplicateAnalysis ? 'bg-purple-100' : 'bg-white'}">
              ${icons.alertCircle}
              Multi-Port Options
            </button>
            <button onclick="toggleShowOnlyFavorites()" class="flex items-center gap-2 px-4 py-2 rounded-lg shadow hover:shadow-md transition ${state.showOnlyFavorites ? 'bg-pink-100' : 'bg-white'}">
              ${state.showOnlyFavorites ? icons.starFilled : icons.star}
              Favorites Only
            </button>
            <button onclick="toggleShowOnlyBooked()" class="flex items-center gap-2 px-4 py-2 rounded-lg shadow hover:shadow-md transition ${state.showOnlyBooked ? 'bg-green-100' : 'bg-white'}">
              ${state.showOnlyBooked ? icons.checkCircleFilled : icons.checkCircle}
              Booked Only
            </button>
            <button onclick="toggleShowHidden()" class="flex items-center gap-2 px-4 py-2 rounded-lg shadow hover:shadow-md transition ${state.showHidden ? 'bg-gray-200' : 'bg-white'}">
              ${state.showHidden ? icons.eye : icons.eyeOff}
              ${state.showHidden ? "Showing Hidden" : "Show Hidden"}
            </button>
          </div>

          <!-- Value Analysis Panel -->
          ${state.showValueAnalysis ? `
          <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-4">
            <h3 class="font-bold text-lg mb-3 flex items-center gap-2">
              <span class="text-yellow-500">${icons.star}</span>
              Top 10 Best Value Excursions (Price per Hour)
            </h3>
            <div class="grid gap-2">
              ${topValuePicks.map((exc, idx) => `
                <div class="flex items-center gap-3 bg-white p-3 rounded-lg">
                  <span class="font-bold text-yellow-600 w-6">${idx + 1}.</span>
                  <div class="flex-1">
                    <span class="font-medium">${exc.name}</span>
                    <span class="text-gray-500 text-sm ml-2">(${exc.port})</span>
                  </div>
                  <span class="text-sm text-gray-600">${exc.duration}</span>
                  <span class="font-bold text-green-600">$${exc.price}</span>
                  <span class="text-xs bg-yellow-100 px-2 py-1 rounded">
                    $${exc.valueScore.toFixed(0)}/hr
                  </span>
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          <!-- Duplicate Analysis Panel -->
          ${state.showDuplicateAnalysis ? `
          <div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-4">
            <h3 class="font-bold text-lg mb-3 flex items-center gap-2">
              <span class="text-purple-500">${icons.alertCircle}</span>
              Excursions Available at Multiple Ports
            </h3>
            <p class="text-sm text-gray-600 mb-4">These excursions are offered on multiple days/ports. Consider which location might be best for each.</p>
            <div class="space-y-4">
              ${duplicateExcursions.map(dup => `
                <div class="bg-white p-4 rounded-lg">
                  <div class="flex justify-between items-start mb-2">
                    <div>
                      <span class="font-bold">${dup.name}</span>
                      <span class="text-gray-500 text-sm ml-2">(${dup.code})</span>
                    </div>
                    <span class="font-bold text-green-600">$${dup.price}</span>
                  </div>
                  <div class="flex flex-wrap gap-2 mb-2">
                    ${dup.dates.map(d => `
                      <span class="text-xs bg-purple-100 px-2 py-1 rounded">
                        ${d.date} - ${d.port}
                      </span>
                    `).join('')}
                  </div>
                  ${dup.recommendation ? `
                    <p class="text-sm text-purple-700 italic">💡 ${dup.recommendation}</p>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          <!-- Filters Panel -->
          ${state.showFilters ? `
          <div class="bg-white rounded-xl shadow-lg p-4 mb-4">
            <div class="flex justify-between items-center mb-4">
              <h2 class="font-bold text-lg">Filters</h2>
              <button onclick="clearFilters()" class="text-blue-600 text-sm hover:underline">
                Clear All
              </button>
            </div>

            <!-- Search -->
            <div class="mb-4">
              <div class="relative">
                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">${icons.search}</span>
                <input
                  type="text"
                  id="search-input"
                  placeholder="Search excursions... (press Enter)"
                  value="${state.searchTerm}"
                  onkeydown="handleSearchKeydown(event)"
                  onblur="updateSearch(this.value)"
                  class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                />
              </div>
            </div>

            <!-- Date Filter -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-2">Dates</label>
              <div class="flex flex-wrap gap-2">
                ${dates.map(date => `
                  <button
                    onclick="toggleDate('${date}')"
                    class="px-3 py-1 rounded-full text-sm transition ${
                      state.selectedDates.has(date)
                        ? 'bg-blue-600 text-white'
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                    }"
                  >
                    ${date}
                  </button>
                `).join('')}
              </div>
            </div>

            <!-- Port Filter -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-2">Ports</label>
              <div class="flex flex-wrap gap-2">
                ${ports.map(port => `
                  <button
                    onclick="togglePort('${port}')"
                    class="px-3 py-1 rounded-full text-sm transition ${
                      state.selectedPorts.has(port)
                        ? 'bg-cyan-600 text-white'
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                    }"
                  >
                    ${port}
                  </button>
                `).join('')}
              </div>
            </div>

            <!-- Category Filter -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Categories ${state.selectedCategories.size > 0 ? `(${state.selectedCategories.size} selected)` : ''}
              </label>
              <div class="flex flex-wrap gap-2">
                ${allCategories.map(cat => `
                  <button
                    onclick="toggleCategory('${cat}')"
                    class="px-3 py-1 rounded-full text-sm transition ${
                      state.selectedCategories.has(cat)
                        ? (categoryConfig[cat]?.color || 'bg-gray-600 text-white')
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                    }"
                  >
                    ${categoryConfig[cat]?.label || cat}
                  </button>
                `).join('')}
              </div>
            </div>

            <!-- Price Range -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Price Range: $${state.priceRange[0]} - $${state.priceRange[1]}
              </label>
              <div class="flex gap-4 items-center">
                <input
                  type="range"
                  min="0"
                  max="1200"
                  step="25"
                  value="${state.priceRange[0]}"
                  oninput="updatePriceMin(this.value)"
                  class="flex-1"
                />
                <input
                  type="range"
                  min="0"
                  max="1200"
                  step="25"
                  value="${state.priceRange[1]}"
                  oninput="updatePriceMax(this.value)"
                  class="flex-1"
                />
              </div>
            </div>

            <!-- Duration Range -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Duration: ${state.durationRange[0]}h - ${state.durationRange[1]}h
              </label>
              <div class="flex gap-4 items-center">
                <input
                  type="range"
                  min="0"
                  max="8"
                  step="0.5"
                  value="${state.durationRange[0]}"
                  oninput="updateDurationMin(this.value)"
                  class="flex-1"
                />
                <input
                  type="range"
                  min="0"
                  max="8"
                  step="0.5"
                  value="${state.durationRange[1]}"
                  oninput="updateDurationMax(this.value)"
                  class="flex-1"
                />
              </div>
            </div>

            <!-- Sort -->
            <div class="flex gap-4 items-center">
              <label class="text-sm font-medium text-gray-700">Sort by:</label>
              <select
                value="${state.sortBy}"
                onchange="updateSort(this.value)"
                class="border rounded-lg px-3 py-1"
              >
                <option value="date" ${state.sortBy === 'date' ? 'selected' : ''}>Date</option>
                <option value="price" ${state.sortBy === 'price' ? 'selected' : ''}>Price</option>
                <option value="duration" ${state.sortBy === 'duration' ? 'selected' : ''}>Duration</option>
                <option value="value" ${state.sortBy === 'value' ? 'selected' : ''}>Value ($/hr)</option>
                <option value="name" ${state.sortBy === 'name' ? 'selected' : ''}>Name</option>
              </select>
              <button
                onclick="toggleSortOrder()"
                class="px-3 py-1 border rounded-lg hover:bg-gray-50"
              >
                ${state.sortOrder === "asc" ? "↑ Asc" : "↓ Desc"}
              </button>
            </div>
          </div>
          ` : ''}

          <!-- Excursions List -->
          <div class="space-y-3">
            ${filteredExcursions.map(exc => `
              <div
                class="bg-white rounded-xl shadow hover:shadow-lg transition p-4 ${
                  state.hiddenIds.has(exc.id) ? 'hidden-item' : ''
                } ${state.favorites.has(exc.id) ? 'favorite-ring' : ''} ${state.booked.has(exc.id) ? 'border-2 border-green-500' : ''}"
              >
                <div class="flex items-start gap-4">
                  <!-- Main Info -->
                  <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                      <span class="text-xs font-mono bg-gray-100 px-2 py-0.5 rounded">${exc.code}</span>
                      <span class="text-xs text-gray-500">${exc.date}</span>
                      <span class="text-xs text-blue-600 flex items-center gap-1">
                        ${icons.mapPin}
                        ${exc.port}
                      </span>
                      ${state.booked.has(exc.id) ? '<span class="text-xs font-bold bg-green-500 text-white px-2 py-0.5 rounded">BOOKED</span>' : ''}
                    </div>
                    <h3 class="font-bold text-lg">${exc.name}</h3>
                    <div class="flex flex-wrap gap-2 mt-2">
                      ${exc.categories.slice(0, 4).map(cat => `
                        <span class="text-xs px-2 py-0.5 rounded-full ${categoryConfig[cat]?.color || 'bg-gray-100'}">
                          ${categoryConfig[cat]?.label || cat}
                        </span>
                      `).join('')}
                      ${exc.categories.length > 4 ? `
                        <span class="text-xs text-gray-500">+${exc.categories.length - 4} more</span>
                      ` : ''}
                    </div>
                  </div>

                  <!-- Price & Duration -->
                  <div class="text-right">
                    <div class="text-2xl font-bold text-green-600">
                      $${exc.price}
                      ${exc.perUnit ? `<span class="text-xs text-gray-500 block">per ${exc.unitType}</span>` : ''}
                    </div>
                    <div class="flex items-center gap-1 text-gray-500 text-sm justify-end mt-1">
                      ${icons.clock}
                      ${exc.duration}
                    </div>
                    <div class="text-xs text-gray-400 mt-1">
                      $${calculateValueScore(exc).toFixed(0)}/hr
                    </div>
                  </div>

                  <!-- Actions -->
                  <div class="flex flex-col gap-2">
                    <button
                      onclick="toggleBooked(${exc.id})"
                      class="p-2 rounded-lg transition ${
                        state.booked.has(exc.id)
                          ? 'bg-green-100 text-green-600'
                          : 'bg-gray-100 text-gray-400 hover:text-green-500'
                      }"
                      title="Mark as booked"
                    >
                      ${state.booked.has(exc.id) ? icons.checkCircleFilled : icons.checkCircle}
                    </button>
                    <button
                      onclick="toggleFavorite(${exc.id})"
                      class="p-2 rounded-lg transition ${
                        state.favorites.has(exc.id)
                          ? 'bg-pink-100 text-pink-600'
                          : 'bg-gray-100 text-gray-400 hover:text-pink-500'
                      }"
                      title="Add to favorites"
                    >
                      ${state.favorites.has(exc.id) ? icons.starFilled : icons.star}
                    </button>
                    <button
                      onclick="toggleHidden(${exc.id})"
                      class="p-2 rounded-lg transition ${
                        state.hiddenIds.has(exc.id)
                          ? 'bg-gray-200 text-gray-600'
                          : 'bg-gray-100 text-gray-400 hover:text-gray-600'
                      }"
                    >
                      ${state.hiddenIds.has(exc.id) ? icons.eye : icons.eyeOff}
                    </button>
                    <button
                      onclick="toggleExpanded(${exc.id})"
                      class="p-2 rounded-lg bg-gray-100 text-gray-400 hover:text-blue-600 transition"
                    >
                      ${state.expandedId === exc.id ? icons.chevronUp : icons.chevronDown}
                    </button>
                  </div>
                </div>

                <!-- Expanded Details -->
                ${state.expandedId === exc.id ? `
                <div class="mt-4 pt-4 border-t">
                  <p class="text-gray-700 mb-3">${exc.description}</p>
                  ${exc.notes ? `
                  <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-3">
                    <p class="text-sm text-yellow-800">
                      <strong>Note:</strong> ${exc.notes}
                    </p>
                  </div>
                  ` : ''}
                  <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                      <span class="text-gray-500">Min Participants:</span>
                      <span class="font-medium">${exc.minPax || "N/A"}</span>
                    </div>
                    <div>
                      <span class="text-gray-500">Max Participants:</span>
                      <span class="font-medium">${exc.maxPax || "N/A"}</span>
                    </div>
                    <div>
                      <span class="text-gray-500">Island:</span>
                      <span class="font-medium">${exc.island}</span>
                    </div>
                    <div>
                      <span class="text-gray-500">Value Score:</span>
                      <span class="font-medium">$${calculateValueScore(exc).toFixed(0)}/hour</span>
                    </div>
                  </div>
                  <div class="mt-3 flex flex-wrap gap-1">
                    ${exc.categories.map(cat => `
                      <span class="text-xs px-2 py-1 rounded-full ${categoryConfig[cat]?.color || 'bg-gray-100'}">
                        ${categoryConfig[cat]?.label || cat}
                      </span>
                    `).join('')}
                  </div>
                </div>
                ` : ''}
              </div>
            `).join('')}
          </div>

          ${filteredExcursions.length === 0 ? `
          <div class="bg-white rounded-xl shadow p-8 text-center">
            <p class="text-gray-500 text-lg">No excursions match your filters.</p>
            <button onclick="clearFilters()" class="mt-4 text-blue-600 hover:underline">
              Clear all filters
            </button>
          </div>
          ` : ''}

          <!-- Summary Footer -->
          ${filteredExcursions.length > 0 ? `
          <div class="mt-6 bg-white rounded-xl shadow p-4">
            <h3 class="font-bold mb-2">Quick Summary</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
              <div>
                <span class="text-gray-500">Cheapest:</span>
                <span class="font-bold text-green-600 ml-2">
                  $${Math.min(...filteredExcursions.map(e => e.price))}
                </span>
              </div>
              <div>
                <span class="text-gray-500">Most Expensive:</span>
                <span class="font-bold text-red-600 ml-2">
                  $${Math.max(...filteredExcursions.map(e => e.price))}
                </span>
              </div>
              <div>
                <span class="text-gray-500">Average:</span>
                <span class="font-bold ml-2">
                  $${Math.round(filteredExcursions.reduce((a, b) => a + b.price, 0) / filteredExcursions.length || 0)}
                </span>
              </div>
              <div>
                <span class="text-gray-500">Best Value:</span>
                <span class="font-bold text-blue-600 ml-2">
                  ${filteredExcursions.reduce((best, current) =>
                      calculateValueScore(current) < calculateValueScore(best) ? current : best
                    ).name.substring(0, 20)}...
                </span>
              </div>
            </div>
            ${state.booked.size > 0 ? `
            <div class="mt-4 pt-4 border-t">
              <div class="flex items-center justify-between">
                <span class="font-bold text-green-700">Booked Excursions Total:</span>
                <span class="text-2xl font-bold text-green-600">
                  $${excursionsData.filter(e => state.booked.has(e.id)).reduce((sum, e) => sum + e.price, 0)}
                </span>
              </div>
              <div class="text-sm text-gray-500 mt-1">
                ${state.booked.size} excursion${state.booked.size !== 1 ? 's' : ''} booked
              </div>
            </div>
            ` : ''}
          </div>
          ` : ''}
        </div>
      `;
    }

    // Event handlers
    function toggleFilters() {
      state.showFilters = !state.showFilters;
      render();
    }

    function toggleValueAnalysis() {
      state.showValueAnalysis = !state.showValueAnalysis;
      render();
    }

    function toggleDuplicateAnalysis() {
      state.showDuplicateAnalysis = !state.showDuplicateAnalysis;
      render();
    }

    function toggleShowOnlyFavorites() {
      state.showOnlyFavorites = !state.showOnlyFavorites;
      if (state.showOnlyFavorites) state.showOnlyBooked = false;
      render();
    }

    function toggleShowOnlyBooked() {
      state.showOnlyBooked = !state.showOnlyBooked;
      if (state.showOnlyBooked) state.showOnlyFavorites = false;
      render();
    }

    function toggleShowHidden() {
      state.showHidden = !state.showHidden;
      render();
    }

    function updateSearch(value) {
      state.searchTerm = value;
      render();
      // Restore focus to search input after render
      setTimeout(() => {
        const input = document.getElementById('search-input');
        if (input && document.activeElement !== input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }, 0);
    }

    function handleSearchKeydown(event) {
      if (event.key === 'Enter') {
        updateSearch(event.target.value);
      }
    }

    function toggleDate(date) {
      if (state.selectedDates.has(date)) {
        state.selectedDates.delete(date);
      } else {
        state.selectedDates.add(date);
      }
      render();
    }

    function togglePort(port) {
      if (state.selectedPorts.has(port)) {
        state.selectedPorts.delete(port);
      } else {
        state.selectedPorts.add(port);
      }
      render();
    }

    function toggleCategory(category) {
      if (state.selectedCategories.has(category)) {
        state.selectedCategories.delete(category);
      } else {
        state.selectedCategories.add(category);
      }
      render();
    }

    function updatePriceMin(value) {
      state.priceRange[0] = parseInt(value);
      render();
    }

    function updatePriceMax(value) {
      state.priceRange[1] = parseInt(value);
      render();
    }

    function updateDurationMin(value) {
      state.durationRange[0] = parseFloat(value);
      render();
    }

    function updateDurationMax(value) {
      state.durationRange[1] = parseFloat(value);
      render();
    }

    function updateSort(value) {
      state.sortBy = value;
      render();
    }

    function toggleSortOrder() {
      state.sortOrder = state.sortOrder === "asc" ? "desc" : "asc";
      render();
    }

    function toggleFavorite(id) {
      if (state.favorites.has(id)) {
        state.favorites.delete(id);
      } else {
        state.favorites.add(id);
      }
      saveState();
      render();
    }

    function toggleBooked(id) {
      if (state.booked.has(id)) {
        state.booked.delete(id);
      } else {
        state.booked.add(id);
      }
      saveState();
      render();
    }

    function toggleHidden(id) {
      if (state.hiddenIds.has(id)) {
        state.hiddenIds.delete(id);
      } else {
        state.hiddenIds.add(id);
      }
      saveState();
      render();
    }

    function toggleExpanded(id) {
      state.expandedId = state.expandedId === id ? null : id;
      render();
    }

    function clearFilters() {
      state.selectedDates = new Set(dates);
      state.selectedPorts = new Set(ports);
      state.selectedCategories = new Set();
      state.priceRange = [0, 1200];
      state.durationRange = [0, 8];
      state.searchTerm = "";
      state.showOnlyFavorites = false;
      state.showOnlyBooked = false;
      render();
    }

    // Initial render
    render();
  </script>
</body>
</html>
